<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFlow - Agentic Orchestration</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 antialiased h-screen overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icon Wrapper Component ---
        const Icon = ({ name, size = 20, className = '' }) => (
            <i className={`fas fa-${name} ${className} flex items-center justify-center`} style={{ fontSize: `${size}px`, width: `${size}px`, height: `${size}px` }}></i>
        );

        // --- Mock Data ---
        const initialWorkflows = [
            { id: 'wf-1', name: 'Lead Enrichment Pipeline', status: 'running', instances: 42, avgTime: '1.2s', cost: '$4.20' },
            { id: 'wf-2', name: 'Support Ticket Triage', status: 'idle', instances: 0, avgTime: '0.8s', cost: '$0.00' },
            { id: 'wf-3', name: 'Daily Report Generator', status: 'running', instances: 3, avgTime: '45.0s', cost: '$12.50' },
            { id: 'wf-4', name: 'Code Review Agent', status: 'aborted', instances: 0, avgTime: '12.4s', cost: '$1.10' },
        ];

        const connectors = [
            { id: 1, name: 'OpenAI', type: 'LLM', status: 'connected', icon: 'bolt', color: 'text-emerald-400' },
            { id: 2, name: 'Google Drive', type: 'Storage', status: 'disconnected', icon: 'database', color: 'text-blue-400' },
            { id: 3, name: 'Salesforce', type: 'CRM', status: 'connected', icon: 'chart-line', color: 'text-blue-500' },
            { id: 4, name: 'Codex CLI', type: 'Compute', status: 'disconnected', icon: 'server', color: 'text-purple-400' },
            { id: 5, name: 'Gmail / SMTP', type: 'Email', status: 'connected', icon: 'cog', color: 'text-red-400' },
        ];

        const organizations = [
            { id: 'org-1', name: 'Acme Corp', teams: 4, users: 128, tier: 'Enterprise', usage: '450GB', spend: '$1,240.00' },
            { id: 'org-2', name: 'Globex Inc', teams: 1, users: 12, tier: 'Pro', usage: '45GB', spend: '$120.00' },
            { id: 'org-3', name: 'Soylent Corp', teams: 2, users: 34, tier: 'Pro', usage: '120GB', spend: '$340.50' },
        ];

        // --- Components ---

        const SidebarItem = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${
                active ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
            >
                <Icon name={icon} size={18} />
                <span className="font-medium text-sm">{label}</span>
            </button>
        );

        const Dashboard = () => (
            <div className="space-y-6">
                <h2 className="text-2xl font-bold text-white mb-6">System Overview</h2>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                {[
                    { label: 'Active Instances', value: '1,248', icon: 'chart-line', color: 'text-emerald-400', trend: '+12%' },
                    { label: 'Compute Time (ms)', value: '45.2M', icon: 'clock', color: 'text-blue-400', trend: '+5%' },
                    { label: 'Data Processed (KB)', value: '8.4B', icon: 'database', color: 'text-purple-400', trend: '+24%' },
                    { label: 'Reseller Revenue', value: '$8,420', icon: 'credit-card', color: 'text-indigo-400', trend: '+18%' },
                ].map((stat, i) => (
                    <div key={i} className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <div className="flex justify-between items-start mb-4">
                        <div className="p-2 bg-slate-900 rounded-lg">
                            <Icon name={stat.icon} size={20} className={stat.color} />
                        </div>
                        <span className="text-emerald-400 text-sm font-medium">{stat.trend}</span>
                    </div>
                    <h3 className="text-slate-400 text-sm font-medium">{stat.label}</h3>
                    <p className="text-3xl font-bold text-white mt-1">{stat.value}</p>
                    </div>
                ))}
                </div>
                <div className="bg-slate-800 border border-slate-700 rounded-xl p-6 h-64 flex items-center justify-center">
                    <p className="text-slate-500"><Icon name="chart-area" size={40} className="mb-4 mx-auto opacity-50" /> [ Compute & Network Utilization Chart Placeholder ]</p>
                </div>
            </div>
        );

        const Workflows = () => {
            const [flows, setFlows] = useState(initialWorkflows);

            const abortFlow = (id) => {
                setFlows(flows.map(f => f.id === id ? { ...f, status: 'aborted', instances: 0 } : f));
            };

            return (
                <div className="space-y-6">
                <div className="flex justify-between items-center">
                    <h2 className="text-2xl font-bold text-white">Flow Orchestration</h2>
                    <button className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-colors">
                        <Icon name="plus" size={14} /> <span>Create Flow</span>
                    </button>
                </div>

                <div className="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                    <table className="w-full text-left border-collapse">
                    <thead>
                        <tr className="bg-slate-900 text-slate-400 text-sm border-b border-slate-700">
                        <th className="p-4 font-medium">Workflow Name</th>
                        <th className="p-4 font-medium">Status</th>
                        <th className="p-4 font-medium">Active Instances</th>
                        <th className="p-4 font-medium">Avg Eval Time</th>
                        <th className="p-4 font-medium">Current Cost</th>
                        <th className="p-4 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-700/50">
                        {flows.map((flow) => (
                        <tr key={flow.id} className="text-slate-300 hover:bg-slate-700/30 transition-colors">
                            <td className="p-4 font-medium text-white">{flow.name}</td>
                            <td className="p-4">
                            <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${
                                flow.status === 'running' ? 'bg-emerald-400/10 text-emerald-400 border border-emerald-400/20' : 
                                flow.status === 'aborted' ? 'bg-rose-400/10 text-rose-400 border border-rose-400/20' : 
                                'bg-slate-600/20 text-slate-400 border border-slate-600/30'
                            }`}>
                                {flow.status.toUpperCase()}
                            </span>
                            </td>
                            <td className="p-4">{flow.instances}</td>
                            <td className="p-4">{flow.avgTime}</td>
                            <td className="p-4">{flow.cost}</td>
                            <td className="p-4 flex justify-end space-x-2">
                            <button className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-emerald-400 bg-slate-900 rounded-lg transition-colors" title="Start/Resume">
                                <Icon name="play" size={12} />
                            </button>
                            <button 
                                onClick={() => abortFlow(flow.id)}
                                disabled={flow.status !== 'running'}
                                className={`w-8 h-8 flex items-center justify-center rounded-lg transition-colors ${
                                flow.status === 'running' 
                                    ? 'text-slate-400 hover:text-rose-400 bg-slate-900' 
                                    : 'text-slate-600 bg-slate-900/50 cursor-not-allowed'
                                }`}
                                title="Abort Execution"
                            >
                                <Icon name="square" size={14} />
                            </button>
                            </td>
                        </tr>
                        ))}
                    </tbody>
                    </table>
                </div>
                </div>
            );
        };

        const Connectors = () => (
            <div className="space-y-6">
                <div className="flex justify-between items-center">
                <h2 className="text-2xl font-bold text-white">Agent Connectors</h2>
                <div className="relative">
                    <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" />
                    <input 
                    type="text" 
                    placeholder="Search integrations..." 
                    className="bg-slate-800 border border-slate-700 text-white rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:border-indigo-500 w-64 transition-colors"
                    />
                </div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {connectors.map(connector => (
                    <div key={connector.id} className="bg-slate-800 border border-slate-700 rounded-xl p-6 flex flex-col items-center text-center hover:border-slate-500 transition-colors">
                    <div className="h-16 w-16 bg-slate-900 rounded-2xl flex items-center justify-center mb-4 border border-slate-700">
                        <Icon name={connector.icon} size={24} className={connector.color} />
                    </div>
                    <h3 className="text-lg font-semibold text-white">{connector.name}</h3>
                    <p className="text-slate-400 text-sm mb-6">{connector.type}</p>
                    <button className={`w-full py-2 rounded-lg font-medium transition-colors ${
                        connector.status === 'connected' 
                        ? 'bg-slate-900 text-slate-300 border border-slate-700 hover:bg-slate-700'
                        : 'bg-indigo-600 text-white hover:bg-indigo-700'
                    }`}>
                        {connector.status === 'connected' ? 'Configure' : 'Connect'}
                    </button>
                    </div>
                ))}
                
                {/* Add Custom Connector Card */}
                <div className="bg-slate-800/50 border border-dashed border-slate-600 rounded-xl p-6 flex flex-col items-center justify-center text-center hover:bg-slate-800/80 hover:border-slate-500 transition-all cursor-pointer">
                    <div className="h-12 w-12 bg-slate-900 rounded-full flex items-center justify-center mb-4 text-slate-400">
                        <Icon name="plus" size={20} />
                    </div>
                    <h3 className="text-slate-300 font-medium">Build Custom Connector</h3>
                    <p className="text-slate-500 text-sm mt-1">REST API, GraphQL, or gRPC</p>
                </div>
                </div>
            </div>
        );

        const Organizations = () => (
            <div className="space-y-6">
                <div className="flex justify-between items-center mb-2">
                <div>
                    <h2 className="text-2xl font-bold text-white">Reseller Management</h2>
                    <p className="text-slate-400 text-sm mt-1">Manage tenant organizations, teams, and billing sub-accounts.</p>
                </div>
                <button className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-colors">
                    <Icon name="plus" size={14} /> <span>New Organization</span>
                </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div className="bg-indigo-900/20 border border-indigo-500/30 p-5 rounded-xl">
                    <div className="flex items-center space-x-3 text-indigo-400 mb-2">
                    <Icon name="layer-group" size={16} /> <span className="font-medium">Total Tenants</span>
                    </div>
                    <p className="text-3xl font-bold text-white">124</p>
                </div>
                <div className="bg-emerald-900/20 border border-emerald-500/30 p-5 rounded-xl">
                    <div className="flex items-center space-x-3 text-emerald-400 mb-2">
                    <Icon name="credit-card" size={16} /> <span className="font-medium">Aggregated Spend</span>
                    </div>
                    <p className="text-3xl font-bold text-white">$45,200.50</p>
                </div>
                <div className="bg-blue-900/20 border border-blue-500/30 p-5 rounded-xl">
                    <div className="flex items-center space-x-3 text-blue-400 mb-2">
                    <Icon name="network-wired" size={16} /> <span className="font-medium">Platform Margin</span>
                    </div>
                    <p className="text-3xl font-bold text-white">32.5%</p>
                </div>
                </div>

                <div className="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                <table className="w-full text-left border-collapse">
                    <thead>
                    <tr className="bg-slate-900 text-slate-400 text-sm border-b border-slate-700">
                        <th className="p-4 font-medium">Organization Name</th>
                        <th className="p-4 font-medium">Plan Tier</th>
                        <th className="p-4 font-medium">Teams / Users</th>
                        <th className="p-4 font-medium">Data / Compute Usage</th>
                        <th className="p-4 font-medium">Current Spend</th>
                        <th className="p-4 font-medium text-right">Settings</th>
                    </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-700/50">
                    {organizations.map((org) => (
                        <tr key={org.id} className="text-slate-300 hover:bg-slate-700/30 transition-colors">
                        <td className="p-4 font-medium text-white">{org.name}</td>
                        <td className="p-4">
                            <span className="bg-slate-900 text-slate-300 px-2.5 py-1 rounded border border-slate-700 text-xs">
                            {org.tier}
                            </span>
                        </td>
                        <td className="p-4">{org.teams} Teams / {org.users} Users</td>
                        <td className="p-4 text-emerald-400">{org.usage}</td>
                        <td className="p-4 font-medium">{org.spend}</td>
                        <td className="p-4 text-right">
                            <button className="text-slate-400 hover:text-white transition-colors">
                                <Icon name="cog" size={16} />
                            </button>
                        </td>
                        </tr>
                    ))}
                    </tbody>
                </table>
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard': return <Dashboard />;
                    case 'workflows': return <Workflows />;
                    case 'connectors': return <Connectors />;
                    case 'organizations': return <Organizations />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div className="flex h-screen bg-slate-950 font-sans selection:bg-indigo-500/30 text-slate-200">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
                        <div className="p-6 flex items-center space-x-3">
                        <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                            <Icon name="bolt" size={16} className="text-white" />
                        </div>
                        <span className="text-xl font-bold tracking-tight text-white">OmniFlow</span>
                        </div>
                        
                        <div className="px-4 py-2">
                        <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 px-2">Core Engine</div>
                        <div className="space-y-1">
                            <SidebarItem icon="chart-line" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <SidebarItem icon="layer-group" label="Workflows" active={activeTab === 'workflows'} onClick={() => setActiveTab('workflows')} />
                            <SidebarItem icon="plug" label="Connectors" active={activeTab === 'connectors'} onClick={() => setActiveTab('connectors')} />
                        </div>
                        </div>

                        <div className="px-4 py-6">
                        <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 px-2">Reseller Hub</div>
                        <div className="space-y-1">
                            <SidebarItem icon="users" label="Organizations" active={activeTab === 'organizations'} onClick={() => setActiveTab('organizations')} />
                            <SidebarItem icon="credit-card" label="Global Billing" active={activeTab === 'billing'} onClick={() => setActiveTab('billing')} />
                        </div>
                        </div>

                        <div className="mt-auto p-4 border-t border-slate-800">
                        <div className="flex items-center space-x-3 px-2">
                            <div className="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center">
                            <span className="font-bold text-slate-300">SA</span>
                            </div>
                            <div>
                            <p className="text-sm font-medium text-white">Super Admin</p>
                            <p className="text-xs text-slate-500">Master Account</p>
                            </div>
                        </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        {/* Top Header */}
                        <header className="h-16 bg-slate-900/50 backdrop-blur-md border-b border-slate-800 flex items-center justify-between px-8 shrink-0">
                        <div className="flex items-center text-sm text-slate-400">
                            <span>OmniFlow Engine</span>
                            <span className="mx-2">/</span>
                            <span className="text-white capitalize">{activeTab}</span>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 flex items-center space-x-2 text-sm cursor-pointer hover:border-slate-500 transition-colors">
                            <span className="text-slate-300">Global Context</span>
                            <Icon name="chevron-down" size={12} className="text-slate-500" />
                            </div>
                            <button className="text-slate-400 hover:text-white relative transition-colors">
                            <Icon name="bell" size={18} />
                            <span className="absolute top-0 right-0 w-2 h-2 bg-rose-500 rounded-full border-2 border-slate-900"></span>
                            </button>
                        </div>
                        </header>

                        {/* Dynamic View Area */}
                        <main className="flex-1 overflow-auto p-8">
                        <div className="max-w-7xl mx-auto pb-12">
                            {renderContent()}
                        </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
