<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Barcode Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        /* Screen styles for the SVGs to keep them responsive */
        .barcode-container svg {
            max-width: 100%;
            height: auto;
        }

        /* Specific styles for printing */
        @media print {
            @page {
                size: A4 portrait;
                margin: 10mm; /* Standard A4 margins */
            }
            body {
                background: white;
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            
            /* Force 5 columns for printing */
            #barcodeGrid {
                display: grid !important;
                grid-template-columns: repeat(5, 1fr) !important;
                gap: 8px !important; /* Smaller gap to fit more */
            }

            .barcode-container {
                break-inside: avoid;
                page-break-inside: avoid;
                padding: 4px !important; /* Reduce padding to save space */
                border: 1px solid #ccc !important; /* Light border for cutting lines if needed */
                box-shadow: none !important;
            }
            
            /* Ensure the main container doesn't add extra margins when printing */
            .max-w-5xl {
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
        
        /* Hover effect for screen only */
        @media screen {
            .barcode-card {
                transition: transform 0.2s;
            }
            .barcode-card:hover {
                transform: translateY(-2px);
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-5xl mx-auto p-6">
        <!-- Header -->
        <header class="mb-8 no-print text-center md:text-left">
            <h1 class="text-3xl font-bold text-slate-800">Parcel Barcode Generator</h1>
            <p class="text-slate-600 mt-2">Generate serialised barcodes for shipping and tracking. Optimized for A4 printing (5 per row).</p>
        </header>

        <!-- Controls -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 no-print">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Prefix</label>
                    <input type="text" id="prefix" value="Parcel " class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Starting Number</label>
                    <input type="number" id="startNum" value="1" min="1" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Quantity</label>
                    <input type="number" id="quantity" value="40" min="1" max="200" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div class="flex gap-2">
                    <button onclick="generateBarcodes()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">
                        Generate
                    </button>
                    <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white p-2 rounded-lg transition-colors" title="Print Labels">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Output Grid -->
        <div id="barcodeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Barcodes will be injected here -->
        </div>

        <div id="emptyState" class="text-center py-20 hidden">
            <p class="text-slate-400">Enter details above and click Generate.</p>
        </div>
    </div>

    <script>
        function generateBarcodes() {
            const grid = document.getElementById('barcodeGrid');
            const prefix = document.getElementById('prefix').value;
            const startNum = parseInt(document.getElementById('startNum').value);
            const quantity = parseInt(document.getElementById('quantity').value);
            
            grid.innerHTML = '';
            
            if (isNaN(startNum) || isNaN(quantity) || quantity <= 0) {
                return;
            }

            for (let i = 0; i < quantity; i++) {
                const currentNum = startNum + i;
                // Pad number to 5 digits (00001)
                const paddedNum = currentNum.toString().padStart(5, '0');
                const fullText = prefix + paddedNum;
                
                // Create container
                const card = document.createElement('div');
                // Added text-center to ensure SVG centers within the grid cell
                card.className = 'barcode-card barcode-container bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center text-center';
                
                // Create SVG element
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.id = `barcode-${i}`;
                card.appendChild(svg);
                
                grid.appendChild(card);
                
                // Render Barcode
                JsBarcode(`#barcode-${i}`, fullText, {
                    format: "CODE128",
                    lineColor: "#000",
                    width: 1.5,      // Slightly thinner bars so it scans well when printed small
                    height: 50,      // Reduced height to fit more rows per page
                    displayValue: true,
                    fontSize: 14,    // Slightly smaller font for better fit
                    fontOptions: "bold",
                    margin: 5
                });
            }
        }

        // Initial generation
        window.onload = () => {
            // Set default quantity to 40 (8 rows of 5) to show off the new layout
            document.getElementById('quantity').value = 40;
            generateBarcodes();
        };
    </script>
</body>
</html>
